<h1>Gestion des armoires</h1>
<mat-card>
  <mat-card-header>
    <mat-form-field>
      <input matInput (keyup)="Filterchange($event)" placeholder="Chercher par un mot clé" />
    </mat-form-field>
    <button *ngIf="connectedUserRole === 'PREPARATEUR'" (click)="addArmoire()" mat-raised-button color="primary">Ajouter une armoire</button>
  </mat-card-header>
  <mat-card-content>
    <div *ngIf="isLoading" class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>

    <table *ngIf="!isLoading" matSort mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="designation">
        <th mat-sort-header mat-header-cell *matHeaderCellDef> Désignation</th>
        <td mat-cell *matCellDef="let element"> {{element.designation}}  </td>
      </ng-container>

      <ng-container matColumnDef="produits">
        <th mat-header-cell *matHeaderCellDef> Produits </th>
        <td mat-cell *matCellDef="let element">
          <span *ngFor="let produit of element.produits; let last = last">
            {{ produit.designation }}{{ last ? '' : ', ' }}
          </span>
          <span *ngIf="!element.produits?.length">Aucun produit</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let element">
          <button (click)="editArmoire(element)" mat-raised-button color="primary">Modifier</button>
          <button (click)="deleteArmoire(element.id)" mat-raised-button color="warn">Supprimer</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
  <mat-card-footer>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </mat-card-footer>
</mat-card>
